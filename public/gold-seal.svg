<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer scalloped ring gradient -->
    <radialGradient id="outerRing" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5d87a"/>
      <stop offset="30%" stop-color="#e8b84b"/>
      <stop offset="60%" stop-color="#c9932a"/>
      <stop offset="80%" stop-color="#b8821e"/>
      <stop offset="100%" stop-color="#9a6a10"/>
    </radialGradient>
    <!-- Main disc gradient - radial brushed metal -->
    <radialGradient id="discGrad" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#fceea0"/>
      <stop offset="15%" stop-color="#f5d87a"/>
      <stop offset="35%" stop-color="#e8c35a"/>
      <stop offset="55%" stop-color="#d4a832"/>
      <stop offset="75%" stop-color="#c99020"/>
      <stop offset="90%" stop-color="#b87c10"/>
      <stop offset="100%" stop-color="#a06808"/>
    </radialGradient>
    <!-- Inner ring accent -->
    <radialGradient id="innerRingGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f9e280"/>
      <stop offset="50%" stop-color="#d4a030"/>
      <stop offset="100%" stop-color="#9a6a10"/>
    </radialGradient>
    <!-- Leaf color -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde090" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c9932a" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Shine overlay -->
    <radialGradient id="shine" cx="38%" cy="28%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip for disc -->
    <clipPath id="discClip">
      <circle cx="100" cy="100" r="68"/>
    </clipPath>
  </defs>

  <!-- Scalloped outer ring: drawn as a gear/scallop polygon -->
  <!-- Using many small arcs to create the scalloped edge -->
  <g>
    <!-- Scalloped border path -->
    <path fill="url(#outerRing)" d="
      M100,8
      A4,4 0 0,1 108,12
      L113,10 A4,4 0 0,1 120,15 L118,20
      A4,4 0 0,1 125,25 L130,22 A4,4 0 0,1 136,28 L133,33
      A4,4 0 0,1 139,39 L144,38 A4,4 0 0,1 148,46 L144,49
      A4,4 0 0,1 147,56 L152,58 A4,4 0 0,1 153,66 L149,67
      A4,4 0 0,1 150,75 L155,78 A4,4 0 0,1 154,87 L150,86
      A4,4 0 0,1 149,95 L154,99 A4,4 0 0,1 151,108 L147,106
      A4,4 0 0,1 144,114 L149,119 A4,4 0 0,1 145,128 L140,125
      A4,4 0 0,1 136,132 L139,138 A4,4 0 0,1 133,146 L129,142
      A4,4 0 0,1 124,147 L125,153 A4,4 0 0,1 118,159 L115,154
      A4,4 0 0,1 109,157 L108,163 A4,4 0 0,1 101,167 L100,161
      A4,4 0 0,1 92,161 L91,167 A4,4 0 0,1 84,163 L83,157
      A4,4 0 0,1 77,154 L74,159 A4,4 0 0,1 67,153 L68,147
      A4,4 0 0,1 63,142 L59,146 A4,4 0 0,1 53,138 L56,132
      A4,4 0 0,1 52,125 L47,128 A4,4 0 0,1 43,119 L48,114
      A4,4 0 0,1 45,106 L41,108 A4,4 0 0,1 38,99 L43,95
      A4,4 0 0,1 42,86 L38,87 A4,4 0 0,1 37,78 L42,75
      A4,4 0 0,1 43,67 L39,66 A4,4 0 0,1 40,58 L45,56
      A4,4 0 0,1 48,49 L44,46 A4,4 0 0,1 48,38 L53,39
      A4,4 0 0,1 59,33 L56,28 A4,4 0 0,1 62,22 L67,25
      A4,4 0 0,1 74,20 L72,15 A4,4 0 0,1 79,10 L84,12
      A4,4 0 0,1 92,8 Z
    "/>

    <!-- Simpler scallop approach: main circle with a scalloped clip using many overlapping circles -->
    <!-- Actually let me use a cleaner approach with a polygon star + circle combination -->
  </g>

  <!-- Outer ring base circle -->
  <circle cx="100" cy="100" r="90" fill="url(#outerRing)"/>

  <!-- Scalloped notches around the edge - small circles cut into the outer ring -->
  <!-- We create scallop effect by placing small circles around the perimeter -->
  <g fill="#FEF5EC">
    <!-- 24 scallop indentations -->
    <circle cx="100" cy="10" r="6"/>
    <circle cx="123.5" cy="13.5" r="6"/>
    <circle cx="144" cy="24" r="6"/>
    <circle cx="160" cy="40" r="6"/>
    <circle cx="169" cy="60" r="6"/>
    <circle cx="172" cy="82" r="6"/>
    <circle cx="168" cy="104" r="6"/>
    <circle cx="158" cy="124" r="6"/>
    <circle cx="144" cy="140" r="6"/>
    <circle cx="126" cy="152" r="6"/>
    <circle cx="106" cy="158" r="6"/>
    <circle cx="84" cy="158" r="6"/>
    <circle cx="64" cy="152" r="6"/>
    <circle cx="46" cy="140" r="6"/>
    <circle cx="32" cy="124" r="6"/>
    <circle cx="22" cy="104" r="6"/>
    <circle cx="18" cy="82" r="6"/>
    <circle cx="21" cy="60" r="6"/>
    <circle cx="30" cy="40" r="6"/>
    <circle cx="46" cy="24" r="6"/>
    <circle cx="66.5" cy="13.5" r="6"/>
    <!-- Extra scallops for the in-between spots -->
    <circle cx="113" cy="10.5" r="5"/>
    <circle cx="87" cy="10.5" r="5"/>
    <circle cx="155" cy="31" r="5"/>
    <circle cx="135" cy="16" r="5"/>
    <circle cx="167" cy="50" r="5"/>
    <circle cx="172" cy="71" r="5"/>
    <circle cx="171" cy="93" r="5"/>
    <circle cx="164" cy="114" r="5"/>
    <circle cx="152" cy="132" r="5"/>
    <circle cx="136" cy="147" r="5"/>
    <circle cx="117" cy="156" r="5"/>
    <circle cx="95" cy="159" r="5"/>
    <circle cx="73" cy="156" r="5"/>
    <circle cx="54" cy="147" r="5"/>
    <circle cx="38" cy="132" r="5"/>
    <circle cx="26" cy="114" r="5"/>
    <circle cx="19" cy="93" r="5"/>
    <circle cx="18" cy="71" r="5"/>
    <circle cx="23" cy="50" r="5"/>
    <circle cx="35" cy="31" r="5"/>
    <circle cx="55" cy="16" r="5"/>
  </g>

  <!-- Inner thin dark ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#9a6a10" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#fde090" stroke-width="1"/>

  <!-- Main gold disc -->
  <circle cx="100" cy="100" r="72" fill="url(#discGrad)"/>

  <!-- Radial brushed metal lines on disc -->
  <g opacity="0.15" clip-path="url(#discClip)">
    <line x1="100" y1="28" x2="100" y2="172" stroke="white" stroke-width="0.8"/>
    <line x1="28" y1="100" x2="172" y2="100" stroke="white" stroke-width="0.8"/>
    <line x1="46" y1="46" x2="154" y2="154" stroke="white" stroke-width="0.8"/>
    <line x1="154" y1="46" x2="46" y2="154" stroke="white" stroke-width="0.8"/>
    <line x1="63" y1="32" x2="137" y2="168" stroke="white" stroke-width="0.6"/>
    <line x1="137" y1="32" x2="63" y2="168" stroke="white" stroke-width="0.6"/>
    <line x1="32" y1="63" x2="168" y2="137" stroke="white" stroke-width="0.6"/>
    <line x1="168" y1="63" x2="32" y2="137" stroke="white" stroke-width="0.6"/>
    <line x1="75" y1="29" x2="125" y2="171" stroke="white" stroke-width="0.5"/>
    <line x1="125" y1="29" x2="75" y2="171" stroke="white" stroke-width="0.5"/>
    <line x1="29" y1="75" x2="171" y2="125" stroke="white" stroke-width="0.5"/>
    <line x1="171" y1="75" x2="29" y2="125" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Inner ring detail line -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#c9932a" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Laurel wreath - left side -->
  <g fill="url(#leafGrad)" stroke="#b8821e" stroke-width="0.5">
    <!-- Left laurel branch -->
    <ellipse cx="60" cy="130" rx="7" ry="4" transform="rotate(-40 60 130)"/>
    <ellipse cx="52" cy="122" rx="7" ry="4" transform="rotate(-55 52 122)"/>
    <ellipse cx="47" cy="112" rx="7" ry="4" transform="rotate(-70 47 112)"/>
    <ellipse cx="46" cy="101" rx="7" ry="4" transform="rotate(-85 46 101)"/>
    <ellipse cx="49" cy="90" rx="7" ry="4" transform="rotate(-100 49 90)"/>
    <ellipse cx="56" cy="81" rx="7" ry="4" transform="rotate(-120 56 81)"/>
    <ellipse cx="66" cy="74" rx="7" ry="4" transform="rotate(-140 66 74)"/>
    <!-- Right laurel branch -->
    <ellipse cx="140" cy="130" rx="7" ry="4" transform="rotate(40 140 130)"/>
    <ellipse cx="148" cy="122" rx="7" ry="4" transform="rotate(55 148 122)"/>
    <ellipse cx="153" cy="112" rx="7" ry="4" transform="rotate(70 153 112)"/>
    <ellipse cx="154" cy="101" rx="7" ry="4" transform="rotate(85 154 101)"/>
    <ellipse cx="151" cy="90" rx="7" ry="4" transform="rotate(100 151 90)"/>
    <ellipse cx="144" cy="81" rx="7" ry="4" transform="rotate(120 144 81)"/>
    <ellipse cx="134" cy="74" rx="7" ry="4" transform="rotate(140 134 74)"/>
  </g>

  <!-- Bottom laurel stem/connection -->
  <path d="M 80 148 Q 100 155 120 148" fill="none" stroke="#c9932a" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Shine overlay on disc -->
  <circle cx="100" cy="100" r="72" fill="url(#shine)"/>
</svg>
